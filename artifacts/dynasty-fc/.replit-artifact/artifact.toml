kind = "web"
previewPath = "/"
title = "Dynasty FC"
version = "1.0.0"
id = "artifacts/dynasty-fc"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22112

[services.development]
run = "pnpm --filter @workspace/dynasty-fc run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dynasty-fc", "run", "build" ]
publicDir = "artifacts/dynasty-fc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22112"
BASE_PATH = "/"
